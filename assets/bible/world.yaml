id: world
name: 水水的绘本世界
inspiration: 原创拟人动物世界设定（去品牌化）

setting: |
  一个温暖的拟人动物世界，所有角色都是直立行走、穿衣服、说话的动物。
  环境是现代家庭日常生活：家、幼儿园、公园、超市、街道。
  画面里不出现真人——所有"人"都是拟人动物。

rules:
  - 所有角色双足直立，类人比例（头大身小一点，更适合儿童绘本）
  - 保留显著的动物特征：耳朵、尾巴、毛色、口鼻轮廓
  - 穿全套人类风格衣服（不是动物原始毛皮）
  - 家庭混合物种是常态——温馨日常，不出现物种之间的冲突或张力情节
  - 现代都市/家庭背景，不出现奇幻元素

family:
  protagonist: shuishui
  members: [shuishui, papa, mama, laolao]

prompt_anchor: |
  modern anthropomorphic animal world,
  bipedal cartoon animal characters wearing modern clothing,
  warm domestic and urban settings,
  storybook illustration tone, no real humans
