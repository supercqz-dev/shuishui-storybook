# ━━━ 图像生成锚点（英文,直接拼 prompt）━━━
# 设计依据:docs/PROMPT_GUIDE.md §5.2 候选 A。
# 关键策略:
# - 起手 "Professional children's picture-book character sheet illustration" → Layer 2 专业语境
# - "chibi proportions are OK for THIS character only" → 显式限定 chibi 不污染 mama/姥姥(2026-05-26 踩坑)
# - "non-photorealistic stylized cartoon" → 让 Layer 3 视觉分类器不要按写实儿童面孔评估
# - "long upright pointy ears" 替代 "bunny ears" → 与 mama 保持同一族系绕过策略,降低多角色场景下的 moderation 风险
# - Outfit (lock exactly) 标签化 → OpenAI 官方 preserve list 模式
prompt_anchor: |
  Professional children's picture-book character sheet illustration:
  the toddler protagonist — a TINY TODDLER-aged stylized cartoon mascot character,
  kawaii baby-plushie aesthetic.
  Body proportions (lock exactly, applies to THIS character only):
  oversized round head about half of total height (head-to-body ratio ~1:2),
  short stubby body, short chubby arms, short chubby legs,
  small hands and feet, soft baby-fat round cheeks.
  She has long upright pointy ears (taller than her head),
  pure white fluffy fur, big bright amber eyes (oversized infant-like),
  small button nose, soft cheerful smile.
  Outfit (lock exactly): a cute pink dress, tiny pink sneakers,
  a pink small-floral-print headband worn on top of her head IN FRONT OF the upright ears,
  with a pink heart-shaped clip pinned ON the headband (the heart clip is on the headband, NOT on her ears).
  Style: modern 3D animated feature film aesthetic, contemporary studio CG look,
  soft volumetric lighting, painterly storybook background, harmonious saturated palette.
  Family-friendly wholesome design suitable for preschoolers ages 3-5,
  fully clothed, non-photorealistic stylized cartoon, non-suggestive pose.
