id: shuishui
name_cn: 水水
name_en: Shuishui
role: protagonist
relation: 家中独女

# ━━━ 基础信息 ━━━
human_age: 3.5
human_age_stage: 幼儿园宝宝班
zodiac_cn: 虎
zodiac_west: 天秤座

# ━━━ 拟人动物设定 ━━━
animal: 白色小兔子
species_en: white rabbit
build_cn: 体型匀称、小巧
height_relative: 同年龄段儿童身高，比成人角色明显矮小

# ━━━ 视觉外观锁（不要随意改！）━━━
visual:
  signature_color: 粉色
  fur: 纯白色绒毛
  ears: 长长的兔耳朵，竖直向上
  tail: 短小毛茸茸的兔尾巴
  eyes: 明亮有神，温暖琥珀色
  outfit:
    dress: 粉色小裙子
    shoes: 粉色运动鞋
    headband: 粉色小碎花发带（戴在头顶兔耳前面，发带上有装饰）
    accessory: 粉色爱心小发卡（钉在发带上，不再单独别在耳边）
  always_wears: [粉色裙子, 粉色运动鞋, 粉色小花发带, 发带上的粉色爱心发卡]

# ━━━ 性格 ━━━
personality:
  core: 爱笑、活泼、好奇、机灵、有点害羞
  traits:
    - 爱笑
    - 爱听歌
    - 活泼但体力有限（玩一会儿就累）
    - 语言天赋好，模仿能力强
    - 小机灵鬼
    - 对陌生人有点害羞
    - 喜欢和大哥哥大姐姐玩
    - 不抗拒同龄又社牛的小朋友
  social_style: 内核温暖+外圈害羞

# ━━━ 喜好 ━━━
favorites:
  characters: [艾莎公主, 朱迪 (Zootopia)]
  food_likes: [肉, 海鲜]
  food_dislikes: [蔬菜]
  food_note: 南北融合胃

# ━━━ 日常 ━━━
daily:
  daycare: 幼儿园宝宝班
  sleep: 睡觉困难户
  daycare_struggle: 幼儿园午睡时老师怎么哄都哄不睡
  best_playmate: 爸爸

# ━━━ 故事素材库（写绘本时参考）━━━
story_seeds:
  recurring_themes:
    - 不爱吃蔬菜怎么办
    - 午睡困难怎么办
    - 害羞遇到陌生人怎么办
    - 体力有限但又想玩
    - 跟着大哥哥大姐姐学新技能

# ━━━ 图像生成锚点(2026-05-28 切换为中文 prompt)━━━
# 中文 prompt 实测出图比英文版更自然(表情灵动、姿态优雅、出"画面"而非 character sheet)。
# 现 4 个角色统一中文路线。旧英文版 prompt 在 git 历史。
prompt_anchor: |
  可爱的拟人化白色小兔子,3.5岁幼儿宝宝,采用高级动画电影级CGI风格,
  大头小身的幼态比例(头占身高约一半,头身比 1:2),
  纯白色蓬松柔软的绒毛,长长的兔耳朵竖立向上(比头还高),
  圆圆肉肉的婴儿脸庞和软软的婴儿肥脸颊,大大明亮的琥珀色眼睛(像婴儿一样略大),
  粉色的小鼻子,甜美温暖的微笑,
  身着粉色小裙子,粉色小运动鞋,
  头顶戴着粉色碎花发带(发带前侧别着一颗粉色爱心发卡,发卡在发带上不在耳朵上),
  活泼好奇的性格,姿态自然放松,
  全身角色设计,电影级柔和的光照,鲜艳而自然的色彩,富有表现力的面部表情,优雅可爱.
