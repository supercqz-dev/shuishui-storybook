  友好开朗的笑容,
  身着白色T恤+深绿色褶皱设计师外套+深蓝色褶皱长裤+深灰色翻毛皮运动鞋,
  左手腕戴着银珠子手链,设计师感利落质感的气质,姿态自然放松挺拔,
