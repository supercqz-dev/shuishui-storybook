id: style
name: 水水的绘本画风
reference: 现代影院级 3D 动画长片美学（去品牌化原创风格）
description: |
  现代影院级 3D 动画长片风格的渲染。
  拟人动物角色，表情丰富生动，温暖电影级布光，柔和边缘光，
  绘本式背景（略带绘画感而非完全写实），干净清晰的角色剪影，
  鲜亮但和谐的色彩，构图友好，适合 3-4 岁孩子阅读。

look:
  rendering: 3D animation
  lighting: warm cinematic lighting, soft rim light
  background_style: painterly storybook (带绘画感)
  silhouette: clean and clear
  palette: vibrant but harmonious, 不要过曝、不要暗黑
  composition: child-friendly, 主体居中或三分法
  proportions: 略夸张的"大头小身"卡通比例

camera_preferences:
  default_shot: medium shot (中景)
  emotional_beats: close-up (情绪特写)
  scene_establishing: wide shot (全景建立环境)
  rule: 让翻页有节奏——避免连续 8 页都是同样景别

avoid:
  - 写实照片风
  - 黑暗、恐怖、惊悚
  - 粗糙手绘草稿感
  - 水彩晕染纹理
  - 日系动漫线条
  - 过度复杂的背景细节（孩子注意力会分散）

prompt_anchor: |
  high-end CG storybook illustration,
  stylized anthropomorphic animal characters with rounded soft shapes,
  expressive friendly faces with large warm eyes,
  cinematic warm golden-hour lighting with soft rim light and gentle ambient occlusion,
  hand-painted picture-book backgrounds with soft brushwork and gentle bokeh,
  clean readable silhouettes, saturated yet harmonious pastel-leaning palette,
  subject-centered framing with shallow depth of field,
  cute stylized cartoon proportions, slightly large heads relative to body,
  fluffy textured fur with subtle painterly detail,
  warm domestic mood, gentle and family-friendly tone,
  rendered with smooth surfaces, no harsh outlines, no photorealistic detail,
  contemporary children's book CG illustration aesthetic
